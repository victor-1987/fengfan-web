name: Deploy to Aliyun

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install
      
    - name: Build
      run: npm run build
      
    - name: Deploy to Aliyun
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 47.112.174.35
        username: root
        password: ${{ secrets.ALIYUN_PASSWORD }}
        script: |
          cd /home/admin/apps/fengfan-web
          git pull origin main
          npm install
          npm run build
          sudo cp -r dist/* /var/www/fengfan-web/
          sudo systemctl reload nginx